name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Vitest · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      # Prisma needs a DATABASE_URL at generate time even though tests never
      # hit a real DB — provide a dummy so `prisma generate` doesn't crash.
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/focura_test

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node + npm cache ──────────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # ── 3. Install deps ──────────────────────────────────────────────────────
      # `postinstall` runs `prisma generate` automatically after this step.
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check ────────────────────────────────────────────────────────
      - name: Type-check
        run: npx tsc --noEmit

      # ── 5. Lint ──────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 6. Run tests ─────────────────────────────────────────────────────────
      - name: Run tests
        run: npm run test:run

      # ── 7. Coverage ──────────────────────────────────────────────────────────
      - name: Generate coverage report
        run: npm run test:coverage
