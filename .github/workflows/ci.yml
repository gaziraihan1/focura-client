name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # --- Public Environment Variables ---
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
      
      # --- Server Environment Variables (Dummies for Build/Test) ---
      # These are required for 'next build' to pass when the code uses non-null assertions (!)
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/focura"
      NEXTAUTH_SECRET: "dummy_secret_for_ci_build_1234567890"
      NEXTAUTH_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:5000"
      GOOGLE_CLIENT_ID: "dummy_google_client_id"
      GOOGLE_CLIENT_SECRET: "dummy_google_client_secret"
      JWT_PRIVATE_KEY: "ZHVtbXlfcHJpdmF0ZV9rZXk=" # base64 for "dummy_private_key"
      UPSTASH_REDIS_URL: "rediss://dummy:password@dummy.upstash.io:6379"
      UPSTASH_REDIS_TOKEN: "dummy_token"
      UPSTASH_REDIS_REST_URL: "https://dummy.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "dummy_token"
      EMAIL_FROM: "noreply@focura.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
